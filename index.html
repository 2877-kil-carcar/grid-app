<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>配置アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="topBar">
    <h3>配置管理</h3>

    <div id="topActions">
      <input id="adminPwInput" type="password" placeholder="管理者PW">
      <button id="adminApproveBtn" type="button">承認</button>
      <a id="memberLink" href="./members.html">同盟員登録</a>
      <div id="currentPosTop"></div>
    </div>
  </div>

  <div id="gridWrapper">
    <div id="grid"></div>
  </div>

  <div id="sheet">
    <div class="sheet-content">
      <div id="list"></div>
      <div id="currentPos" style="margin-bottom:8px; font-weight:bold;"></div>
      <button type="button" onclick="closeSheet()">閉じる</button>
    </div>
  </div>
  <div id="coordHint"></div>
  <script type="module" src="./js/app.js"></script>

</body>
</html>
